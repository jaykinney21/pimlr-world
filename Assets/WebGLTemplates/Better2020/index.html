<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>{{{ PRODUCT_NAME }}}</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico" />
  <link rel="stylesheet" href="TemplateData/style.css" />
  <style>
    .outer-box-wrap {
      position: absolute;
      z-index: 2147483647;
      border: none;
      left: 0px;
      top: 0px;
      width: 100%;
      height: 100%;
      background: #000000c2;
      display: none;
      align-items: center;
      justify-content: center;
    }

    #hidemecamerabtn {
      position: absolute;
      right: 20%;
      top: 20%;
      border-radius: 20px;
      height: 40px;
      width: 40px;
      font-size: 30px;
      font-weight: 600;
    }
  </style>
</head>

<body class="{{{ SPLASH_SCREEN_STYLE.toLowerCase() }}}">
  <div class="outer-box-wrap" id="iframeClose">


  </div>
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas"></canvas>
    <div id="loading-cover" class="loader-desktop" style="display: block;">
      <div id="unity-loading-bar" style="position: relative; width: 100%; height: 100;">
        <div id="unity-logo" style="width: 100%; display: flex;">
          <video type="Stryker_14/mp4" id="video1" src="Stryker_14.mp4"
            style="max-width: 100%; max-height: 100vh;width: 100%;object-fit: cover;" autoplay loop muted></video>
        </div>
        <!-- <div id="unity-logo"><img src="logo.png" /></div> -->
        <div id="unity-progress-bar-empty" style="display: none; position: absolute; bottom: 10px;">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div class="spinner"></div>
      </div>
    </div>
    <div id="unity-fullscreen-button" style="display: none"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
    <script>


      const hideFullScreenButton = "{{{ HIDE_FULL_SCREEN_BUTTON }}}";
      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      const config = {
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
        #if MEMORY_FILENAME
              memoryUrl: buildUrl + "/{{{ MEMORY_FILENAME }}}",
        #endif
      #if SYMBOLS_FILENAME
              symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
        #endif
              streamingAssetsUrl: "StreamingAssets",
        companyName: "{{{ COMPANY_NAME }}}",
        productName: "{{{ PRODUCT_NAME }}}",
        productVersion: "{{{ PRODUCT_VERSION }}}",
      };

      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const loadingCover = document.querySelector("#loading-cover");
      const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const fullscreenButton = document.querySelector("#unity-fullscreen-button");
      const spinner = document.querySelector('.spinner');

      const canFullscreen = (function () {
        for (const key of [
          'exitFullscreen',
          'webkitExitFullscreen',
          'webkitCancelFullScreen',
          'mozCancelFullScreen',
          'msExitFullscreen',
        ]) {
          if (key in document) {
            return true;
          }
        }
        return false;
      }());

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          var myVideo = document.getElementById("video1");
        //  console.log("myVideo", myVideo)
          myVideo.play();
          spinner.style.display = "none";
          progressBarEmpty.style.display = "";
          progressBarFull.style.width = `${100 * progress}%`;
          canvas.style.display = "none";
        }).then((unityInstance) => {
          loadingCover.style.display = "none";
          canvas.style.display = "block";
          if (canFullscreen) {
            if (!hideFullScreenButton) {
              fullscreenButton.style.display = "";
            }
            window.unityInstance = unityInstance; // <-- this
            fullscreenButton.onclick = () => {
              window.vuplex.SetFullscreen(1)/*https://support.vuplex.com/articles/webgl-fullscreen*/;
            };
          }
        }).catch((message) => {
          alert(message);
        });
      };
      document.body.appendChild(script);
    </script>
    <script>
      function speak(text) {
        if ('speechSynthesis' in window) {
          var msg = new SpeechSynthesisUtterance(text);
          window.speechSynthesis.speak(msg);
        } else {
          console.log("Text-to-Speech not supported.");
        }
      }
      // Function to stop speaking
      function stopSpeaking() {
        if (window.speechSynthesis.speaking) {
          window.speechSynthesis.cancel();
        }
      }
      // Event listener for the Escape key
      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
          stopSpeaking();
        }
      });
    </script>
</body>

</html>
